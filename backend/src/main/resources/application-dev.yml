server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:caseflow}?serverTimezone=Asia/Shanghai&allowMultiQueries=true&rewriteBatchedStatements=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 1
      password:
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-cookie: false

ui:
  screenshot:
    dir: ${UI_SCREENSHOT_DIR:uploads/ui-screenshots}

# 原有配置（server、spring、mybatis-plus、sa-token）保持不变，新增以下 logging 节点
logging:
  # 1. 全局日志级别（默认：INFO，开发环境可设为 DEBUG，生产设为 INFO/WARN）
  level:
    root: INFO
    # 2. 按组件精准设置日志级别（重点）
    # Spring 核心（如 web、context）
    org.springframework: INFO
    # Spring Data Redis（ lettuce 客户端）
    org.springframework.data.redis: INFO
    # MyBatis-Plus / MyBatis（SQL 打印，开发设为 DEBUG，生产设为 INFO）
    com.baomidou.mybatisplus: INFO
    # 自定义 mapper 包（替换成你的 mapper 包名，打印具体 SQL）
    com.caseflow.mapper: DEBUG
    # Sa-Token 核心日志（com.dev33.satoken）
    com.dev33.satoken: INFO
    # Sa-Token Redis 存储日志（如需排查 Redis 存储问题，设为 DEBUG）
    com.dev33.satoken.dao.redis: INFO
    # MySQL JDBC 驱动（排查数据库连接问题用）
    com.mysql.cj.jdbc: INFO
  # 3. 可选：日志输出格式（自定义控制台日志样式）
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

